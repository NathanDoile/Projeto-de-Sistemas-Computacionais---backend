name: Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Adicionado: O Sonar precisa do histórico completo para analisar melhor

      - name: Configurar o JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar e Rodar Testes com Maven
        run: mvn -B package --file pom.xml -DskipTests

      #- name: Analisar com SonarCloud
        #env:
          #GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Adicionei aspas nos parâmetros para evitar erros no PowerShell do Windows
        #run: >
          #mvn -B verify sonar:sonar
          #"-Dsonar.projectKey="
          #"-Dsonar.organization="
          #"-Dsonar.host.url=https://sonarcloud.io"
          #"-f" "pom.xml" -DskipTests

      - name: Armazenar o artefato (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: pacote-da-aplicacao
          path: target/*.jar