name: Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Adicionado: O Sonar precisa do histórico completo para analisar melhor

      - name: Configurar o JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar e Rodar Testes com Maven
        run: mvn -B clean verify -f pom.xml

      - name: Analisar com SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Adicionei aspas nos parâmetros para evitar erros no PowerShell do Windows
        run: >
          mvn -B sonar:sonar
          "-Dsonar.projectKey=NathanDoile_Projeto-de-Sistemas-Computacionais---backend"
          "-Dsonar.organization=nathandoile"
          "-Dsonar.host.url=https://sonarcloud.io"
          "-Dsonar.coverage.jacoco.xmlReportPaths=check_if/target/site/jacoco/jacoco.xml" 
          "-f" "pom.xml"

      - name: Armazenar o artefato (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: pacote-da-aplicacao
          path: target/*.jar